# Render Blueprint — https://render.com/docs/blueprint-spec
# One Node web service (React app + REST + WebSocket + CTO orchestrator) plus a
# managed Postgres (Basic tier, paid — persistent, no free-tier expiry), both in
# Singapore so the internal DB connection works.
# Our tables live in a dedicated `mission_control` schema.
databases:
  - name: mission-control-db
    plan: basic-256mb
    region: singapore

services:
  - type: web
    name: mission-control
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /login
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: 22.22.3
      - key: DATABASE_URL
        fromDatabase:
          name: mission-control-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: AUTH_USERNAME
        sync: false
      - key: AUTH_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Your assigned tasks run on this (needs billing for Pro).
      - key: GEMINI_MODEL
        value: gemini-2.5-pro
      # AUTO demo runs on free-tier Flash (set to "" for pure simulation).
      - key: GEMINI_DEMO_MODEL
        value: gemini-2.5-flash
