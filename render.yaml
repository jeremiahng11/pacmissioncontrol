# Render Blueprint — https://render.com/docs/blueprint-spec
# One Node web service (React app + REST + WebSocket + CTO orchestrator).
# Render free tier allows only ONE Postgres per account, so this blueprint does
# NOT create a database. Reuse your existing free Postgres: paste its Internal
# Database URL into DATABASE_URL when prompted. Our tables live in a dedicated
# `mission_control` schema, so sharing a DB with another app is safe.
services:
  - type: web
    name: mission-control
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /login
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: 22.22.3
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: AUTH_USERNAME
        sync: false
      - key: AUTH_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-pro
