# Render Blueprint — https://render.com/docs/blueprint-spec
# Web Service: Vite builds the client bundle, server.js serves dist/ on $PORT.
# Extend server.js (or add a second service) when the API/WebSocket backend lands.
services:
  - type: web
    name: mission-control
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    pullRequestPreviewsEnabled: true
