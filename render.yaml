# Render Blueprint — https://render.com/docs/blueprint-spec
# One Node web service (React app + REST + WebSocket + CTO orchestrator) backed
# by a managed Postgres database. Set AUTH_*/GEMINI_API_KEY in the dashboard.
databases:
  - name: mission-control-db
    plan: free

services:
  - type: web
    name: mission-control
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /login
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: 22.22.3
      - key: DATABASE_URL
        fromDatabase:
          name: mission-control-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: AUTH_USERNAME
        sync: false
      - key: AUTH_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
